{% extends 'base.html' %}
{% block content %}
<section class="hero glass">
  <h1>Welcome to KhestraBlocks</h1>
  <p>Secure Blockchain Property Registry</p>
  <form method="post" action="{{ url_for('login') }}" class="inline-form">
    <input type="text" name="name" value="Demo User" placeholder="Name">
    <input type="email" name="email" value="demo.user@gmail.com" placeholder="Google Email">
    <button type="submit">Login with Google</button>
  </form>
  <a class="button-link" href="{{ url_for('ledger') }}">Explore Property Ledger</a>
</section>
{% endblock %}
